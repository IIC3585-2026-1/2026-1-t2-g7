<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Motor de Consultas</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="container">
      <h1>Motor de consultas en memoria</h1>
      <p>
        Base para probar consultas sobre una lista de objetos usando
        encadenamiento de funciones.
      </p>

      <section class="filtros">
        <h2>Consulta con IA</h2>

        <div class="fila-filtros">
          <label for="consulta-ia">Describe la consulta</label>
          <textarea
            id="consulta-ia"
            rows="3"
            placeholder="Ej: quiero todas las personas que tengan mas de 15 años, agrupalas por pais y muestra el promedio de edad"
          ></textarea>
        </div>

        <div class="actions">
          <button id="interpretar-consulta">Interpretar con IA</button>
        </div>

        <p id="estado-ia"></p>
      </section>

      <section class="filtros">
        <h2>Filtros simples</h2>

        <div class="fila-filtros">
          <label for="campos-seleccionados">Campos a mostrar</label>
          <input
            id="campos-seleccionados"
            type="text"
            placeholder="nombre, ciudad"
          />
        </div>

        <div class="fila-filtros">
          <label for="campo-filtro">Campo</label>
          <select id="campo-filtro"></select>
        </div>

        <div class="fila-filtros">
          <label for="operador-filtro">Operador</label>
          <select id="operador-filtro">
            <option value="contiene">Contiene</option>
            <option value="igual">Igual a</option>
            <option value="mayor">Mayor que</option>
            <option value="mayor_o_igual">Mayor o igual</option>
            <option value="menor">Menor que</option>
            <option value="menor_o_igual">Menor o igual</option>
          </select>
        </div>

        <div class="fila-filtros">
          <label for="valor-filtro">Valor</label>
          <input id="valor-filtro" type="text" placeholder="Escribe un valor" />
        </div>

        <div class="fila-filtros">
          <label for="campo-orden">Ordenar por</label>
          <select id="campo-orden"></select>
        </div>

        <div class="fila-filtros">
          <label for="direccion-orden">Direccion</label>
          <select id="direccion-orden">
            <option value="asc">Ascendente</option>
            <option value="desc">Descendente</option>
          </select>
        </div>

        <div class="actions">
          <button id="aplicar-filtros">Aplicar filtros</button>
          <button id="limpiar-filtros">Limpiar</button>
        </div>
      </section>

      <section class="filtros">
        <h2>Agrupacion simple</h2>

        <div class="fila-filtros">
          <label for="campo-grupo">Campo para agrupar</label>
          <select id="campo-grupo"></select>
        </div>

        <div class="fila-filtros">
          <label for="campo-promedio">Campo numerico para promedio</label>
          <select id="campo-promedio"></select>
        </div>

        <div class="actions">
          <button id="ver-agrupacion">Ver agrupacion</button>
        </div>
      </section>

      <section>
        <h2>Datos</h2>
        <pre id="salida-datos">Cargando datos...</pre>
      </section>

      <section>
        <h2 id="titulo-resultado">Resultado</h2>
        <pre id="salida-resultado">Esperando datos...</pre>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
